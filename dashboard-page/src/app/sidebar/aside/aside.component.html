<aside class="sidebar" [class.active]="isMenuOpen()">
    <div class="top">
        <img src="jira.png" alt="">
        <h3>Jira</h3>
        <div class="close" >
            <ion-icon name="close-outline"></ion-icon>
        </div>
    </div>
    
    <div class="bottom">
        @for (link of links; track link.id) {
            <app-link-item [item]="link"/>
        }
    </div>
</aside>
