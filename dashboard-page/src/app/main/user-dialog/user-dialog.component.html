<div class="backdrop" (click)="closeDialog()"></div>
<dialog open>
  <img src="profile-picture.jpg" alt="">
  <span> {{ user().name }} </span>
  <span> {{ user().price }} </span>
  <span> {{ user().countProducts }} </span>
  <span> {{ user().packageCount }} </span>
  <span class="status">+{{ user().status }} </span>
</dialog>
